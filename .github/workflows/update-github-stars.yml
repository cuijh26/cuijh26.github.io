name: Update GitHub stars

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update cached star counts
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'assets/data/github-stars.json';
            const repos = [
              'fudan-generative-vision/WAM-Diff',
              'fudan-generative-vision/WAM-Flow',
              'fudan-generative-vision/hallo4',
              'fudan-generative-vision/hallo3',
              'fudan-generative-vision/hallo2'
            ];

            const output = {
              updated_at: new Date().toISOString(),
              repos: {}
            };

            for (const repo of repos) {
              const [owner, name] = repo.split('/');
              const { data } = await github.rest.repos.get({ owner, repo: name });
              output.repos[repo] = {
                stargazers_count: data.stargazers_count
              };
            }

            fs.mkdirSync('assets/data', { recursive: true });
            fs.writeFileSync(path, JSON.stringify(output, null, 2) + '\n');

      - name: Commit updated star counts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update GitHub star counts
          file_pattern: assets/data/github-stars.json
